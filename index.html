<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>Teaful Studio</title>

<style>

body{
margin:0;
font-family:Helvetica;
background:#f6f6f6;
text-align:center;
}

/* header */

.header{
padding:25px;
font-size:28px;
letter-spacing:6px;
background:white;
}

/* template */

.templates{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:20px;
}

.card{
background:white;
height:120px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

/* create */

.create{
position:fixed;
bottom:25px;
left:50%;
transform:translateX(-50%);
background:black;
color:white;
padding:14px 30px;
border-radius:30px;
cursor:pointer;
}

/* editor */

#editor{
display:none;
padding:20px;
}

canvas{
border:2px solid black;
border-radius:10px;
background:white;
touch-action:none;
}

.toolbar{
margin-top:15px;
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}

button{
padding:10px 16px;
border:none;
background:black;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">TEAFUL</div>

<div id="templates" class="templates">

<div class="card" onclick="openEditor('Love')">Love Cup</div>
<div class="card" onclick="openEditor('Birthday')">Birthday Cup</div>
<div class="card" onclick="openEditor('Friend')">Best Friend</div>
<div class="card" onclick="openEditor('Lucky')">Lucky Day</div>

</div>

<div class="create" onclick="openEditor()">

Create Sticker

</div>

<div id="editor">

<h2>Create Your Cup</h2>

<canvas id="canvas" width="320" height="320"></canvas>

<div class="toolbar">

<input id="textInput" placeholder="Text">

<button onclick="addText()">Add Text</button>

<button onclick="clearCanvas()">Clear</button>

<button onclick="downloadImage()">Save</button>

</div>

<div class="toolbar">

<button onclick="addSticker('⭐')">⭐</button>
<button onclick="addSticker('❤️')">❤️</button>
<button onclick="addSticker('🍵')">🍵</button>
<button onclick="addSticker('🎉')">🎉</button>

</div>

<input type="file" id="upload">

</div>

<script>

function openEditor(type){

document.getElementById("templates").style.display="none"
document.querySelector(".create").style.display="none"
document.getElementById("editor").style.display="block"

if(type=="Birthday"){

ctx.font="24px Helvetica"
ctx.fillText("Happy Birthday",60,160)

}

}

/* canvas */

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let drawing=false

function getPos(e){

const rect=canvas.getBoundingClientRect()

if(e.touches){

return{
x:e.touches[0].clientX-rect.left,
y:e.touches[0].clientY-rect.top
}

}

return{
x:e.clientX-rect.left,
y:e.clientY-rect.top
}

}

/* mouse */

canvas.addEventListener("mousedown",start)
canvas.addEventListener("mouseup",stop)
canvas.addEventListener("mousemove",draw)

/* touch */

canvas.addEventListener("touchstart",start)
canvas.addEventListener("touchend",stop)
canvas.addEventListener("touchmove",draw)

function start(e){
drawing=true
draw(e)
}

function stop(){
drawing=false
ctx.beginPath()
}

function draw(e){

if(!drawing)return

e.preventDefault()

const pos=getPos(e)

ctx.lineWidth=3
ctx.lineCap="round"

ctx.lineTo(pos.x,pos.y)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(pos.x,pos.y)

}

function clearCanvas(){

ctx.clearRect(0,0,canvas.width,canvas.height)

}

function addText(){

let text=document.getElementById("textInput").value

ctx.font="26px Helvetica"

ctx.fillText(text,80,150)

}

function addSticker(s){

ctx.font="40px serif"

let x=Math.random()*240
let y=Math.random()*240

ctx.fillText(s,x,y)

}

document.getElementById("upload").addEventListener("change",function(e){

const file=e.target.files[0]

const reader=new FileReader()

reader.onload=function(event){

const img=new Image()

img.onload=function(){

ctx.drawImage(img,60,60,200,200)

}

img.src=event.target.result

}

reader.readAsDataURL(file)

})

function downloadImage(){

let link=document.createElement("a")

link.download="teaful.png"

link.href=canvas.toDataURL()

link.click()

}

</script>

</body>

</html>
