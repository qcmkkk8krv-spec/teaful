
<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>Teaful</title>

<style>

body{
margin:0;
font-family:Helvetica, Arial, sans-serif;
background:#f3f1f6;
text-align:center;
}

/* 启动页 /

#loading{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#f3f1f6;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;

}

/ 卡通图 /

#startup{

width:220px;
animation:float 2s ease;

}

/ Logo /

#logo{

margin-top:25px;

}

.logo-text{

font-size:44px;
letter-spacing:8px;
font-weight:600;

}

.logo-sub{

font-size:12px;
letter-spacing:4px;
margin-top:8px;
color:#666;

}

/ 动画 /

@keyframes float{

0%{
transform:translateY(20px);
opacity:0;
}

100%{
transform:translateY(0);
opacity:1;
}

}

@keyframes fade{

0%{opacity:0}

100%{opacity:1}

}

/ 主页面 /

#main{

display:none;
padding-top:20px;

}

canvas{

background:white;
border:2px solid black;
border-radius:10px;

}

button{

padding:10px 18px;
margin:6px;
border:none;
background:black;
color:white;
border-radius:6px;
cursor:pointer;

}

button:hover{

background:#333;

}

</style>

</head>

<body>

<!-- 启动页 -->

<div id="loading">

<img src="startup.png" id="startup">

<div id="logo">

<div class="logo-text">TEAFUL</div>

<div class="logo-sub">A CUP FULL OF HAPPINESS</div>

</div>

</div>

<!-- 主页面 -->

<div id="main">

<h2>Design Your Teaful Cup</h2>

<canvas id="canvas" width="320" height="320"></canvas>

<br>

<input id="textInput" placeholder="Type text">

<br>

<button onclick="addText()">Add Text</button>

<button onclick="clearCanvas()">Clear</button>

<button onclick="downloadImage()">Save Sticker</button>

</div>

<script>

/ 启动页3秒 /

setTimeout(function(){

document.getElementById("loading").style.display="none"

document.getElementById("main").style.display="block"

},3000)

/ 画图 */

const canvas=document.getElementById("canvas")

const ctx=canvas.getContext("2d")

let drawing=false

canvas.onmousedown=()=>drawing=true

canvas.onmouseup=()=>{

drawing=false

ctx.beginPath()

}

canvas.onmousemove=function(e){

if(!drawing)return

ctx.lineWidth=3
ctx.lineCap="round"

ctx.lineTo(e.offsetX,e.offsetY)

ctx.stroke()

ctx.beginPath()

ctx.moveTo(e.offsetX,e.offsetY)

}

function clearCanvas(){

ctx.clearRect(0,0,canvas.width,canvas.height)

}

function addText(){

let text=document.getElementById("textInput").value

ctx.font="26px Helvetica"

ctx.fillText(text,90,150)

}

function downloadImage(){

let link=document.createElement("a")

link.download="teaful-cup.png"

link.href=canvas.toDataURL()

link.click()

}

</script>

</body>

</html>
