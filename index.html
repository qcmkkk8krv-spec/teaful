<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<title>Teaful Studio</title>

<style>

body{
margin:0;
font-family:Helvetica;
background:#f4f4f4;
text-align:center;
}

/* header */

.header{
padding:25px;
font-size:28px;
letter-spacing:6px;
background:white;
}

/* template grid */

.templates{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
padding:20px;
}

.card{
background:white;
height:120px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.card img{
max-width:80px;
}

/* create button */

.createBtn{
margin:20px;
padding:12px 25px;
background:black;
color:white;
border-radius:8px;
cursor:pointer;
}

/* editor */

#editor{
display:none;
padding:20px;
}

canvas{
border:2px solid black;
border-radius:10px;
background:white;
touch-action:none;
}

.toolbar{
margin-top:15px;
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
}

button{
padding:10px 16px;
border:none;
background:black;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">TEAFUL</div>

<!-- 模板区 -->

<div id="templates" class="templates">

<div class="card" onclick="printSticker('cry.png')">
< img src="cry.png">
</div>

<div class="card" onclick="printSticker('planet.png')">
< img src="planet.png">
</div>

<div class="card" onclick="printSticker('party.png')">
< img src="party.png">
</div>

<div class="card" onclick="printSticker('hat.png')">
< img src="hat.png">
</div>

<div class="card" onclick="printSticker('cake.png')">
< img src="cake.png">
</div>

</div>

<div class="createBtn" onclick="openCreate()">

Create Your Sticker

</div>

<!-- 编辑器 -->

<div id="editor">

<h2>Create</h2>

<canvas id="canvas" width="420" height="420"></canvas>

<div class="toolbar">

<button onclick="mode='draw'">Draw</button>
<button onclick="mode='move'">Move</button>
<button onclick="clearCanvas()">Clear</button>
<button onclick="saveImage()">Save</button>

</div>

<div class="toolbar">

<input type="file" id="upload">

</div>

</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let stickers=[]
let current=null
let drawing=false
let mode="move"

/* 模板打印 */

function printSticker(img){

const image=new Image()

image.src=img

image.onload=function(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.drawImage(image,100,100,200,200)

}

}

/* 进入创作 */

function openCreate(){

document.getElementById("templates").style.display="none"
document.querySelector(".createBtn").style.display="none"
document.getElementById("editor").style.display="block"

}

/* 画画 + 拖动 */

function getPos(e){

const rect=canvas.getBoundingClientRect()

if(e.touches){

return{
x:e.touches[0].clientX-rect.left,
y:e.touches[0].clientY-rect.top
}

}

return{
x:e.clientX-rect.left,
y:e.clientY-rect.top
}

}

canvas.addEventListener("mousedown",start)
canvas.addEventListener("mousemove",move)
canvas.addEventListener("mouseup",end)

canvas.addEventListener("touchstart",start)
canvas.addEventListener("touchmove",move)
canvas.addEventListener("touchend",end)

function start(e){

const pos=getPos(e)

if(mode==="draw"){

drawing=true
ctx.beginPath()
ctx.moveTo(pos.x,pos.y)

}

}

function move(e){

const pos=getPos(e)

if(mode==="draw" && drawing){

ctx.lineTo(pos.x,pos.y)
ctx.stroke()

}

}

function end(){

drawing=false

}

/* 上传照片 */

upload.onchange=function(e){

const file=e.target.files[0]

const reader=new FileReader()

reader.onload=function(event){

const img=new Image()

img.src=event.target.result

img.onload=function(){

ctx.drawImage(img,120,120,180,180)

}

}

reader.readAsDataURL(file)

}

/* 清空 */

function clearCanvas(){

ctx.clearRect(0,0,canvas.width,canvas.height)

}

/* 保存 */

function saveImage(){

const link=document.createElement("a")

link.download="teaful.png"

link.href=canvas.toDataURL()

link.click()

}

</script>

</body>

</html>
