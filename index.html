<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Teaful Cup Designer</title>

<style>

body{
font-family:Arial;
background:#f3f3f3;
text-align:center;
}

h1{
margin-top:20px;
font-weight:600;
}

canvas{
background:white;
border:2px solid black;
border-radius:10px;
touch-action:none;
}

button{

padding:10px 18px;
margin:6px;
border:none;
background:black;
color:white;
border-radius:6px;
font-size:14px;
cursor:pointer;

}

button:hover{
background:#333;
}

.toolbar{
margin-top:10px;
}

.sticker{
font-size:22px;
background:#fff;
border:1px solid #ccc;
}

</style>

</head>

<body>

<h1>Design Your Teaful Cup</h1>

<canvas id="canvas" width="320" height="320"></canvas>

<div class="toolbar">

<input id="textInput" placeholder="Type text">

<button onclick="addText()">Add Text</button>
<button onclick="clearCanvas()">Clear</button>
<button onclick="downloadImage()">Save Sticker</button>

</div>

<h3>Add Stickers</h3>

<button class="sticker" onclick="addSticker('❤️')">❤️</button>
<button class="sticker" onclick="addSticker('⭐')">⭐</button>
<button class="sticker" onclick="addSticker('🌿')">🌿</button>
<button class="sticker" onclick="addSticker('😊')">😊</button>
<button class="sticker" onclick="addSticker('🍵')">🍵</button>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let drawing=false;

function getPos(e){

const rect=canvas.getBoundingClientRect();

if(e.touches){
return{
x:e.touches[0].clientX-rect.left,
y:e.touches[0].clientY-rect.top
}
}

return{
x:e.clientX-rect.left,
y:e.clientY-rect.top
}

}

canvas.addEventListener("mousedown",start);
canvas.addEventListener("mouseup",stop);
canvas.addEventListener("mousemove",draw);

canvas.addEventListener("touchstart",start);
canvas.addEventListener("touchend",stop);
canvas.addEventListener("touchmove",draw);

function start(e){
drawing=true
draw(e)
}

function stop(){
drawing=false
ctx.beginPath()
}

function draw(e){

if(!drawing) return

e.preventDefault()

const pos=getPos(e)

ctx.lineWidth=3
ctx.lineCap="round"

ctx.lineTo(pos.x,pos.y)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(pos.x,pos.y)

}

function clearCanvas(){
ctx.clearRect(0,0,canvas.width,canvas.height)
}

function addText(){

let text=document.getElementById("textInput").value

ctx.font="24px Arial"
ctx.fillStyle="black"

ctx.fillText(text,100,150)

}

function addSticker(sticker){

ctx.font="40px Arial"

let x=Math.random()*250
let y=Math.random()*250

ctx.fillText(sticker,x,y)

}

function downloadImage(){

let link=document.createElement("a")

link.download="teaful-cup.png"

link.href=canvas.toDataURL()

link.click()

}

</script>

</body>
</html>
