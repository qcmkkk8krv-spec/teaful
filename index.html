<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<title>Teaful Studio</title>

<style>

body{
margin:0;
font-family:Helvetica;
background:#f5f5f5;
text-align:center;
}

.header{
padding:25px;
font-size:28px;
letter-spacing:6px;
background:white;
}

.templates{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
padding:20px;
}

.card{
background:white;
height:120px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.card img{
max-width:80px;
}

#editor{
display:none;
}

canvas{
border:2px solid black;
border-radius:10px;
background:white;
touch-action:none;
}

.toolbar{
margin-top:15px;
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
}

button{
padding:10px 16px;
border:none;
background:black;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">TEAFUL</div>

<div id="templates" class="templates">

<div class="card" onclick="loadTemplate('cry.png')">
< img src="cry.png">
</div>

<div class="card" onclick="loadTemplate('planet.png')">
< img src="planet.png">
</div>

<div class="card" onclick="loadTemplate('party.png')">
< img src="party.png">
</div>

<div class="card" onclick="loadTemplate('hat.png')">
< img src="hat.png">
</div>

<div class="card" onclick="loadTemplate('cake.png')">
< img src="cake.png">
</div>

</div>

<div id="editor">

<h2>Create Your Cup</h2>

<canvas id="canvas" width="420" height="420"></canvas>

<div class="toolbar">

<button onclick="mode='draw'">Draw</button>
<button onclick="mode='move'">Move</button>
<button onclick="clearCanvas()">Clear</button>
<button onclick="saveImage()">Save</button>

</div>

<div class="toolbar">

<input type="file" id="upload">

</div>

</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let stickers=[]
let current=null
let mode="move"

let drawing=false

function openEditor(){

document.getElementById("templates").style.display="none"
document.getElementById("editor").style.display="block"

}

function loadTemplate(src){

openEditor()

addSticker(src)

}

function addSticker(src){

const img=new Image()

img.src=src

img.onload=function(){

stickers.push({
img:img,
x:150,
y:150,
w:120,
h:120
})

draw()

}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

stickers.forEach(s=>{
ctx.drawImage(s.img,s.x,s.y,s.w,s.h)
})

}

function getPos(e){

const rect=canvas.getBoundingClientRect()

if(e.touches){

return{
x:e.touches[0].clientX-rect.left,
y:e.touches[0].clientY-rect.top
}

}

return{
x:e.clientX-rect.left,
y:e.clientY-rect.top
}

}

canvas.addEventListener("mousedown",start)
canvas.addEventListener("mousemove",move)
canvas.addEventListener("mouseup",end)

canvas.addEventListener("touchstart",start)
canvas.addEventListener("touchmove",move)
canvas.addEventListener("touchend",end)

function start(e){

const pos=getPos(e)

if(mode=="draw"){

drawing=true
ctx.beginPath()
ctx.moveTo(pos.x,pos.y)

}

if(mode=="move"){

stickers.forEach(s=>{

if(pos.x>s.x && pos.x<s.x+s.w && pos.y>s.y && pos.y<s.y+s.h){

current=s

}

})

}

}

function move(e){

const pos=getPos(e)

if(mode=="draw" && drawing){

ctx.lineTo(pos.x,pos.y)
ctx.stroke()

}

if(mode=="move" && current){

current.x=pos.x-current.w/2
current.y=pos.y-current.h/2
draw()

}

}

function end(){

drawing=false
current=null

}

canvas.addEventListener("wheel",function(e){

if(current){

current.w+=e.deltaY*-0.1
current.h+=e.deltaY*-0.1
draw()

}

})

upload.onchange=function(e){

const file=e.target.files[0]

const reader=new FileReader()

reader.onload=function(event){

const img=new Image()

img.src=event.target.result

img.onload=function(){

stickers.push({
img:img,
x:120,
y:120,
w:150,
h:150
})

draw()

}

}

reader.readAsDataURL(file)

}

function clearCanvas(){

stickers=[]
ctx.clearRect(0,0,canvas.width,canvas.height)

}

function saveImage(){

const link=document.createElement("a")

link.download="teaful.png"

link.href=canvas.toDataURL()

link.click()

}

</script>

</body>

</html>
