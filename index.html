<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>Teaful Cup Designer</title>

<style>

body{

margin:0;
font-family:Arial;
background:#f6f6f6;
text-align:center;

}

/* 启动页 */

#loading{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:9999;

}

#cup{

width:140px;
animation:pop 1.5s ease;

}

#brand{

font-size:30px;
margin-top:10px;
opacity:0;
animation:fade 2s forwards;
animation-delay:1s;

}

@keyframes pop{

0%{transform:scale(0)}

60%{transform:scale(1.2)}

100%{transform:scale(1)}

}

@keyframes fade{

from{opacity:0}

to{opacity:1}

}

/* 主页面 */

#main{

display:none;
padding-top:20px;

}

canvas{

background:white;
border:2px solid black;
border-radius:10px;
}

button{

padding:10px 18px;
margin:6px;
border:none;
background:black;
color:white;
border-radius:6px;
cursor:pointer;

}

button:hover{

background:#333;

}

</style>

</head>

<body>

<!-- 启动动画 -->

<div id="loading">

< img src="cup.png" id="cup">

<div id="brand">Teaful</div>

</div>

<!-- 主页面 -->

<div id="main">

<h2>Design Your Teaful Cup</h2>

<canvas id="canvas" width="320" height="320"></canvas>

<br>

<input id="textInput" placeholder="Type text">

<br>

<button onclick="addText()">Add Text</button>

<button onclick="clearCanvas()">Clear</button>

<button onclick="downloadImage()">Save Sticker</button>

</div>

<script>

/* 启动页3秒 */

setTimeout(function(){

document.getElementById("loading").style.display="none"

document.getElementById("main").style.display="block"

},2500)

/* 画画 */

const canvas=document.getElementById("canvas")

const ctx=canvas.getContext("2d")

let drawing=false

canvas.onmousedown=()=>drawing=true

canvas.onmouseup=()=>{

drawing=false

ctx.beginPath()

}

canvas.onmousemove=function(e){

if(!drawing)return

ctx.lineWidth=3

ctx.lineCap="round"

ctx.lineTo(e.offsetX,e.offsetY)

ctx.stroke()

ctx.beginPath()

ctx.moveTo(e.offsetX,e.offsetY)

}

function clearCanvas(){

ctx.clearRect(0,0,canvas.width,canvas.height)

}

function addText(){

let text=document.getElementById("textInput").value

ctx.font="24px Arial"

ctx.fillText(text,100,150)

}

function downloadImage(){

let link=document.createElement("a")

link.download="teaful-cup.png"

link.href=canvas.toDataURL()

link.click()

}

</script>

</body>

</html>
