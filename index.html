<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TEAFUL STUDIO</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
text-align:center;
}

h1{
letter-spacing:6px;
margin:20px 0;
}

.templates{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
padding:20px;
}

.card{
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.card img{
width:70px;
}

button{
background:black;
color:white;
border:none;
padding:10px 18px;
border-radius:6px;
margin:6px;
}

#createPage{
display:none;
}

canvas{
border:2px solid black;
border-radius:12px;
background:white;
touch-action:none;
}

.toolbar{
margin-top:10px;
}

</style>
</head>

<body>

<h1>TEAFUL</h1>

<div id="templatePage">

<div class="templates">

<div class="card" onclick="printSticker('cry.png')">
< img src="cry.png">
</div>

<div class="card" onclick="printSticker('planet.png')">
< img src="planet.png">
</div>

<div class="card" onclick="printSticker('party.png')">
< img src="party.png">
</div>

<div class="card" onclick="printSticker('hat.png')">
< img src="hat.png">
</div>

<div class="card" onclick="printSticker('cake.png')">
< img src="cake.png">
</div>

</div>

<button onclick="openCreate()">Create Your Sticker</button>

</div>


<div id="createPage">

<h2>Create</h2>

<canvas id="canvas" width="320" height="320"></canvas>

<div class="toolbar">

<button onclick="mode='draw'">Draw</button>
<button onclick="mode='erase'">Eraser</button>
<button onclick="mode='move'">Move</button>
<button onclick="deleteSticker()">Delete</button>
<button onclick="clearCanvas()">Clear</button>
<button onclick="save()">Save</button>

<br>

<input type="file" id="upload">

<br>

<label>Brush</label>
<input type="range" id="size" min="2" max="30" value="6">

</div>

</div>


<script>

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

let drawing=false
let mode="draw"
let brushSize=6

let stickers=[]
let selected=null

document.getElementById("size").oninput=e=>{
brushSize=e.target.value
}

canvas.addEventListener("mousedown",start)
canvas.addEventListener("mousemove",move)
canvas.addEventListener("mouseup",end)

canvas.addEventListener("touchstart",e=>{
start(e.touches[0])
})

canvas.addEventListener("touchmove",e=>{
e.preventDefault()
move(e.touches[0])
})

canvas.addEventListener("touchend",end)

function start(e){

let rect=canvas.getBoundingClientRect()
let x=e.clientX-rect.left
let y=e.clientY-rect.top

drawing=true

if(mode=="move"){

selected=null

stickers.forEach(s=>{
if(x>s.x && x<s.x+s.w && y>s.y && y<s.y+s.h){
selected=s
}
})

}

ctx.beginPath()
ctx.moveTo(x,y)

}

function move(e){

let rect=canvas.getBoundingClientRect()
let x=e.clientX-rect.left
let y=e.clientY-rect.top

if(mode=="draw" && drawing){

ctx.lineWidth=brushSize
ctx.globalCompositeOperation="source-over"

ctx.lineTo(x,y)
ctx.stroke()

}

if(mode=="erase" && drawing){

ctx.lineWidth=brushSize
ctx.globalCompositeOperation="destination-out"

ctx.lineTo(x,y)
ctx.stroke()

}

if(mode=="move" && selected){

selected.x=x-selected.w/2
selected.y=y-selected.h/2

render()

}

}

function end(){
drawing=false
ctx.beginPath()
}

function render(){

ctx.clearRect(0,0,canvas.width,canvas.height)

stickers.forEach(s=>{
ctx.drawImage(s.img,s.x,s.y,s.w,s.h)
})

}

function deleteSticker(){

if(selected){

stickers=stickers.filter(s=>s!=selected)
selected=null
render()

}

}

function clearCanvas(){

stickers=[]
ctx.clearRect(0,0,canvas.width,canvas.height)

}

function save(){

let img=canvas.toDataURL()

let w=window.open()

w.document.write("< img src='"+img+"' width=300>")
w.print()

}

function openCreate(){

document.getElementById("templatePage").style.display="none"
document.getElementById("createPage").style.display="block"

}

function printSticker(img){

let w=window.open()

w.document.write("< img src='"+img+"' width=300>")
w.print()

}

document.getElementById("upload").onchange=e=>{

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=function(ev){

let img=new Image()

img.onload=function(){

stickers.push({
img:img,
x:60,
y:60,
w:150,
h:150
})

render()

}

img.src=ev.target.result

}

reader.readAsDataURL(file)

}

canvas.addEventListener("wheel",e=>{

if(selected){

let scale=e.deltaY<0?1.1:0.9

selected.w*=scale
selected.h*=scale

render()

}

})

</script>

</body>
</html>
