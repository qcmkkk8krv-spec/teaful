<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Teaful Studio</title>

<style>

body{
margin:0;
font-family:Helvetica;
background:#f5f5f5;
}

/* header */

.header{
text-align:center;
padding:25px;
background:white;
font-size:28px;
letter-spacing:6px;
}

/* tabs */

.tabs{
display:flex;
justify-content:center;
background:white;
border-bottom:1px solid #ddd;
}

.tab{
padding:15px 25px;
cursor:pointer;
}

.active{
border-bottom:3px solid black;
}

/* template grid */

.templates{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
padding:20px;
}

.card{
background:white;
height:120px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.card img{
max-width:70px;
}

/* editor */

#editor{
display:none;
padding:15px;
text-align:center;
}

canvas{
border:2px solid black;
border-radius:10px;
background:white;
touch-action:none;
}

/* toolbar */

.toolbar{
margin-top:15px;
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}

button{
padding:10px 14px;
border:none;
background:black;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">TEAFUL</div>

<div class="tabs">

<div class="tab active">Templates</div>
<div class="tab" onclick="openEditor()">Create</div>

</div>

<div id="templates" class="templates">

<div class="card" onclick="addTemplate('cry.png')">
< img src="cry.png">
</div>

<div class="card" onclick="addTemplate('planet.png')">
< img src="planet.png">
</div>

<div class="card" onclick="addTemplate('party.png')">
< img src="party.png">
</div>

<div class="card" onclick="addTemplate('hat.png')">
< img src="hat.png">
</div>

<div class="card" onclick="addTemplate('cake.png')">
< img src="cake.png">
</div>

</div>

<div id="editor">

<h2>Create Your Cup</h2>

<canvas id="canvas" width="420" height="420"></canvas>

<div class="toolbar">

<button onclick="clearCanvas()">Clear</button>
<button onclick="downloadImage()">Save</button>

</div>

<div class="toolbar">

<button onclick="addSticker('cry.png')">😭</button>
<button onclick="addSticker('planet.png')">🪐</button>
<button onclick="addSticker('party.png')">🎉</button>

</div>

<div class="toolbar">

<input type="file" id="upload">

</div>

</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let stickers=[]
let current=null

function openEditor(){

document.getElementById("templates").style.display="none"
document.getElementById("editor").style.display="block"

}

/* template */

function addTemplate(src){

openEditor()

addSticker(src)

}

/* sticker */

function addSticker(src){

const img=new Image()

img.src=src

img.onload=function(){

stickers.push({

img:img,
x:150,
y:150,
w:100,
h:100

})

draw()

}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

stickers.forEach(s=>{

ctx.drawImage(s.img,s.x,s.y,s.w,s.h)

})

}

/* drag */

canvas.addEventListener("mousedown",start)
canvas.addEventListener("mousemove",move)
canvas.addEventListener("mouseup",end)

canvas.addEventListener("touchstart",start)
canvas.addEventListener("touchmove",move)
canvas.addEventListener("touchend",end)

function getPos(e){

const rect=canvas.getBoundingClientRect()

if(e.touches){

return{

x:e.touches[0].clientX-rect.left,
y:e.touches[0].clientY-rect.top

}

}

return{

x:e.clientX-rect.left,
y:e.clientY-rect.top

}

}

function start(e){

const pos=getPos(e)

stickers.forEach(s=>{

if(

pos.x>s.x &&
pos.x<s.x+s.w &&
pos.y>s.y &&
pos.y<s.y+s.h

){

current=s

}

})

}

function move(e){

if(!current)return

const pos=getPos(e)

current.x=pos.x-current.w/2
current.y=pos.y-current.h/2

draw()

}

function end(){

current=null

}

/* upload */

upload.onchange=function(e){

const file=e.target.files[0]

const reader=new FileReader()

reader.onload=function(event){

const img=new Image()

img.src=event.target.result

img.onload=function(){

stickers.push({

img:img,
x:100,
y:100,
w:150,
h:150

})

draw()

}

}

reader.readAsDataURL(file)

}

/* clear */

function clearCanvas(){

stickers=[]
draw()

}

/* save */

function downloadImage(){

let link=document.createElement("a")

link.download="teaful.png"

link.href=canvas.toDataURL()

link.click()

}

</script>

</body>

</html>
