<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>TEAFUL Studio</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
text-align:center;
}

h1{
letter-spacing:6px;
margin-top:30px;
}

.subtitle{
color:#666;
margin-bottom:20px;
}

.tabs{
margin-top:10px;
}

.tabs span{
margin:0 20px;
cursor:pointer;
font-weight:bold;
padding-bottom:6px;
}

.active{
border-bottom:2px solid black;
}

.templates{
display:grid;
grid-template-columns:repeat(3,110px);
gap:20px;
justify-content:center;
margin-top:30px;
}

.template{
background:white;
padding:12px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
cursor:pointer;
}

canvas{
border:2px solid #333;
background:white;
margin-top:20px;
}

.controls{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:8px;
margin-top:15px;
}

button{
padding:8px 12px;
border:none;
background:black;
color:white;
border-radius:6px;
cursor:pointer;
}

input{
padding:6px;
margin-top:10px;
}

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:9999;
}

#lottie{
width:160px;
height:160px;
}

@media(max-width:600px){

.templates{
grid-template-columns:repeat(3,1fr);
}

canvas{
width:90vw;
height:90vw;
}

}

</style>

</head>

<body>


<div id="loader">

<div id="lottie"></div>

<h1>TEAFUL</h1>

<p class="subtitle">
Full of tea<br>
Full of good<br>
Full of you
</p >

</div>



<h1>TEAFUL</h1>

<div class="subtitle">
Full of tea · Full of good · Full of you
</div>


<div class="tabs">

<span id="tabTemplate" class="active">Templates</span>
<span id="tabCreate">Create</span>

</div>



<div id="templatePage">

<div class="templates">

<div class="template" onclick="addSticker('cry.png')">
< img src="cry.png" width="70">
</div>

<div class="template" onclick="addSticker('planet.png')">
< img src="planet.png" width="70">
</div>

<div class="template" onclick="addSticker('party.png')">
< img src="party.png" width="70">
</div>

<div class="template" onclick="addSticker('hat.png')">
< img src="hat.png" width="70">
</div>

<div class="template" onclick="addSticker('cake.png')">
< img src="cake.png" width="70">
</div>

</div>

<br>

<button onclick="openCreate()">Create Your Sticker</button>

</div>



<div id="createPage" style="display:none">

<br>

<button onclick="back()">← Back</button>

<h3>Sticker Studio</h3>

<canvas id="canvas" width="400" height="400"></canvas>


<div class="controls">

<button onclick="enableDraw()">✏ Draw</button>
<button onclick="enableErase()">🧽 Erase</button>
<button onclick="canvas.isDrawingMode=false">✋ Move</button>
<button onclick="undo()">Undo</button>
<button onclick="clearCanvas()">Clear</button>
<button onclick="printSticker()">Print</button>

</div>


<br>

<input type="file" id="upload">

<br><br>

<input id="textInput" placeholder="Type text or emoji">
<button onclick="addText()">Add Text</button>

</div>



<script>


lottie.loadAnimation({
container:document.getElementById("lottie"),
renderer:"svg",
loop:true,
autoplay:true,
path:"./tea-loading.json"
})


document.addEventListener("DOMContentLoaded",function(){

setTimeout(function(){

document.getElementById("loader").style.display="none"

},1500)

})


var canvas=new fabric.Canvas("canvas")

var history=[]


function saveState(){

history.push(JSON.stringify(canvas))

}

canvas.on("object:added",saveState)
canvas.on("object:modified",saveState)


function undo(){

if(history.length>1){

history.pop()

canvas.loadFromJSON(history[history.length-1],canvas.renderAll.bind(canvas))

}

}


function clearCanvas(){

canvas.clear()

}


function addSticker(src){

fabric.Image.fromURL(src,function(img){

img.scaleToWidth(130)
canvas.add(img)

})

}


document.getElementById("upload").onchange=function(e){

var reader=new FileReader()

reader.onload=function(f){

fabric.Image.fromURL(f.target.result,function(img){

img.scaleToWidth(200)
canvas.add(img)

})

}

reader.readAsDataURL(e.target.files[0])

}


function addText(){

var text=document.getElementById("textInput").value

var t=new fabric.Text(text,{

left:120,
top:120,
fontSize:32

})

canvas.add(t)

}


function enableDraw(){

canvas.isDrawingMode=true
canvas.freeDrawingBrush.width=3

}


function enableErase(){

canvas.isDrawingMode=true
canvas.freeDrawingBrush.width=20

}


function printSticker(){

var data=canvas.toDataURL({

format:"png",
multiplier:3

})

var w=window.open()

w.document.write("< img src='"+data+"' style='width:90mm'>")

w.print()

}


function openCreate(){

document.getElementById("templatePage").style.display="none"
document.getElementById("createPage").style.display="block"

document.getElementById("tabTemplate").classList.remove("active")
document.getElementById("tabCreate").classList.add("active")

}


function back(){

document.getElementById("templatePage").style.display="block"
document.getElementById("createPage").style.display="none"

document.getElementById("tabTemplate").classList.add("active")
document.getElementById("tabCreate").classList.remove("active")

}

</script>

</body>
</html>
